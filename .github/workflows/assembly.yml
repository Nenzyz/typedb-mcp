name: Assembly Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  assembly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run assembly test
        run: ./test/run_assembly.sh
